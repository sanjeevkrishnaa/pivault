version: "3.9"

services:
  pivault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivault
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - nas_storage:/data/storage
    environment:
      - PORT=8080
      - STORAGE_ROOT=/data/storage
      - NODE_ENV=production
      - MOTION_RECORDING_ENABLED=0
      - MOTION_GPIO_PIN=17
      - MOTION_RECORD_SECONDS=60
      - MOTION_CAMERA_DEVICE=/dev/video0
      - MOTION_OUTPUT_DIR=camera-events
    networks:
      - pivault_net
    devices:
      - "/dev/video0:/dev/video0"
    privileged: true

volumes:
  nas_storage:

networks:
  pivault_net:
    driver: bridge
