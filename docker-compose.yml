services:
  pivault:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivault
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ${NAS_HOST_PATH:-./storage}:/data/storage
      - /sys/class/gpio:/sys/class/gpio
    environment:
      - PORT=8080
      - STORAGE_ROOT=/data/storage
      - NODE_ENV=production
      - MOTION_RECORDING_ENABLED=0
      - MOTION_GPIO_PIN=17
      - MOTION_GPIO_SYSFS_PIN=
      - MOTION_GPIO_ACTIVE_HIGH=1
      - MOTION_RECORD_SECONDS=5
      - MOTION_CAMERA_DEVICE=/dev/video0
      - MOTION_OUTPUT_DIR=camera-events
      - MOTION_FFMPEG_BIN=ffmpeg
      - MQ2_ENABLED=1
      - MQ2_GPIO_PIN=21
      - MQ2_GPIO_SYSFS_PIN=
      - MQ2_ACTIVE_HIGH=0
      - BUZZER_GPIO_PIN=22
      - BUZZER_GPIO_SYSFS_PIN=
      - BUZZER_ACTIVE_HIGH=0
    networks:
      - pivault_net
    devices:
      - "/dev/video0:/dev/video0"
      - "/dev/gpiomem:/dev/gpiomem"
      - "/dev/gpiochip0:/dev/gpiochip0"
    privileged: true

networks:
  pivault_net:
    driver: bridge
